# MiMo 智能相册 — 多模态 AI 配置

ai:
  model: "mimo-multimodal"
  tasks:
    - image_classification
    - ocr_extraction
    - embedding_generation
  batch_size: 32
  max_tokens_per_request: 4096

search:
  engine: "semantic"
  nlu: "chinese-natural-language"
  index: "faiss"
  similarity_threshold: 0.78

dedup:
  method: "dual-engine"
  engines:
    - phash
    - embedding_cosine
  similarity_threshold: 0.92

storage:
  photos: "icloud-drive"
  index: "localstorage"
  vectors: "faiss-local"

exif:
  extract: true
  fields:
    - gps
    - camera
    - datetime
    - resolution

ui:
  framework: "md3"
  grid_columns: 3
  themes: 5
  pwa: true
